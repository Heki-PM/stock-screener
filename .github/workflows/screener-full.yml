name: Stock Screener – Full Scan (bez filtrów)

# ──────────────────────────────────────────────
#  TRIGGERY
# ──────────────────────────────────────────────
on:
  # 1. Ręczne uruchomienie z GitHub UI (Actions → Run workflow)
  workflow_dispatch:
    inputs:
      include_strong_buy:
        description: 'Uwzględnij sygnały Strong BUY'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      include_buy:
        description: 'Uwzględnij sygnały BUY'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      include_turning_up:
        description: 'Uwzględnij sygnały Turning Up'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

  # 2. Harmonogram – co poniedziałek o 07:30 UTC (9:30 PL czasu letniego)
  #    Odkomentuj poniższe 2 linie, aby włączyć automatyczne skany tygodniowe
  # schedule:
  #   - cron: '30 7 * * 1'

# ──────────────────────────────────────────────
#  UPRAWNIENIA (zapis do repozytorium)
# ──────────────────────────────────────────────
permissions:
  contents: write

jobs:
  scan:
    name: Full SMI Scan
    runs-on: ubuntu-latest
    timeout-minutes: 90          # pełny scan może trwać do ~60–75 min

    steps:
      # 1. Pobierz kod
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      # 2. Python 3.11
      - name: Ustaw Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Zainstaluj zależności
      - name: Zainstaluj biblioteki
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests

      # 4. (Opcjonalnie) nadpisz flagi sygnałów z inputu workflow_dispatch
      #    Przy uruchomieniu scheduled wartości domyślne = true/true/true
      - name: Ustaw zmienne środowiskowe
        run: |
          echo "INCLUDE_STRONG_BUY=${{ github.event.inputs.include_strong_buy || 'true' }}" >> $GITHUB_ENV
          echo "INCLUDE_BUY=${{ github.event.inputs.include_buy || 'true' }}"                 >> $GITHUB_ENV
          echo "INCLUDE_TURNING_UP=${{ github.event.inputs.include_turning_up || 'true' }}"  >> $GITHUB_ENV

      # 5. Uruchom screener full scan
      - name: Uruchom screener_all.py
        run: python scripts/screener_all.py
        env:
          PYTHONUNBUFFERED: '1'

      # 6. Skopiuj wyniki do folderu docs/ (GitHub Pages serwuje z docs/)
      #    Jeśli używasz gałęzi gh-pages lub folderu results_all/ – dostosuj ścieżki
      - name: Przygotuj katalog docs/
        run: |
          mkdir -p docs
          # Główny raport HTML – zastępuje poprzedni
          cp results_all/index.html docs/index_all.html
          # Pełny pakiet danych JSON + CSV
          cp results_all/results.json  docs/results_all.json  2>/dev/null || true
          cp results_all/strong.json   docs/strong_all.json   2>/dev/null || true
          cp results_all/buy.json      docs/buy_all.json      2>/dev/null || true
          cp results_all/turning.json  docs/turning_all.json  2>/dev/null || true
          cp results_all/meta.json     docs/meta_all.json     2>/dev/null || true
          cp results_all/results.csv   docs/results_all.csv   2>/dev/null || true

      # 7. Wyświetl podsumowanie w logach Actions
      - name: Podsumowanie skanu
        run: |
          echo "========================================"
          echo "FULL SCAN zakończony"
          echo "========================================"
          python - <<'EOF'
          import json, os
          path = "results_all/meta.json"
          if os.path.exists(path):
              m = json.load(open(path))
              print(f"Przeskanowano : {m.get('total_scanned','?')} spolek")
              print(f"Sygnaly SMI  : {m.get('weekly_signals','?')}")
              print(f"Strong BUY   : {m.get('results_strong','?')}")
              print(f"BUY          : {m.get('results_buy','?')}")
              print(f"Turning Up   : {m.get('results_turning','?')}")
              print(f"Czas skanu   : {m.get('elapsed_min','?')} min")
          else:
              print("Brak pliku meta.json – skan mogl sie nie powiesc")
          EOF

      # 8. Zatwierdź i wypchnij wyniki do repozytorium
      - name: Commit i push wynikow
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ results_all/ || true
          # Commit tylko jeśli są zmiany
          git diff --cached --quiet || \
            git commit -m "chore: full scan SMI $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
